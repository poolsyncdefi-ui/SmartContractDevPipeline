    confidence: 0.85

  - name: "halo2.generate_proof"
    description: "Génère une preuve Halo2"
    confidence: 0.80

  - name: "halo2.verify_proof"
    description: "Vérifie une preuve Halo2"
    confidence: 0.90

  - name: "halo2.check_availability"
    description: "Vérifie la disponibilité de Halo2"
    confidence: 1.0

metadata:
