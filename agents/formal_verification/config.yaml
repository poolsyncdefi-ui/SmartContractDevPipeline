# ============================================================================
# agents/formal_verification/config.yaml
# Configuration de l'Agent de Vérification Formelle - Version 2.1.0
# ============================================================================

agent:
  # === IDENTIFICATION ===
  name: "formal_verification"
  class_name: "FormalVerificationAgent"
  module_path: "agents.formal_verification.agent"
  display_name: "🔬 Agent Vérification Formelle"
  version: "2.1.0"
  description: |-
    Agent de vérification formelle garantissant mathématiquement
    la correction des smart contracts via Certora Prover, Halo2,
    exécution symbolique et vérification d'invariants.
  purpose: "Garantir mathématiquement la correction des smart contracts"

  # === TYPE ET CARACTÉRISTIQUES ===
  agent_type: "concrete"
  abstract: false
  instantiate: true
  enabled: true
  mandatory: false
  singleton: false
  execution_order: 8

  # === HÉRITAGE & DÉPENDANCES ===
  extends: "BaseAgent"
  parent: "BaseAgent"
  dependencies:
    - "base_agent"
    - "smart_contract"
  initialization_order: 8

  # === CAPACITÉS SPÉCIFIQUES ===
  capabilities:
    - name: "certora_integration"
      description: "Vérification avec Certora Prover"
      confidence: 0.95
    - name: "halo2_proofs"
      description: "Génération de preuves ZK avec Halo2"
      confidence: 0.90
    - name: "mythril_analysis"
      description: "Analyse de sécurité avec Mythril"
      confidence: 0.88
    - name: "symbolic_execution"
      description: "Exécution symbolique de contrats"
      confidence: 0.85
    - name: "invariant_checking"
      description: "Vérification d'invariants"
      confidence: 0.92
    - name: "counterexample_generation"
      description: "Génération de contre-exemples"
      confidence: 0.90
    - name: "automated_spec_generation"
      description: "Génération automatique de spécifications"
      confidence: 0.80
    - name: "certificate_generation"
      description: "Certificats de vérification"
      confidence: 0.95
    - name: "multi_tool_comparison"
      description: "Comparaison multi-outils"
      confidence: 0.85
    - name: "bulk_verification"
      description: "Vérification par lots"
      confidence: 0.90

  # ============================================================================
  # SOUS-AGENTS SPÉCIALISÉS
  # ============================================================================
  subAgents:
    - id: "certora_specialist"
      enabled: true
      name: "CertoraSpecialistSubAgent"
      display_name: "🔷 Spécialiste Certora"
      description: "Expert en vérification Certora Prover"
      config_path: "agents/formal_verification/sous_agents/certora_specialist/config.yaml"
      module_path: "agents.formal_verification.sous_agents.certora_specialist.agent"
      class_name: "CertoraSpecialistSubAgent"
      version: "2.0.0"
      dependencies: []
      initialization_order: 1

    - id: "halo2_specialist"
      enabled: false
      name: "Halo2SpecialistSubAgent"
      display_name: "🟣 Spécialiste Halo2"
      description: "Expert en preuves Halo2"
      config_path: "agents/formal_verification/sous_agents/halo2_specialist/config.yaml"
      module_path: "agents.formal_verification.sous_agents.halo2_specialist.agent"
      class_name: "Halo2SpecialistSubAgent"
      version: "2.0.0"
      dependencies: []
      initialization_order: 2

    - id: "mythril_specialist"
      enabled: true
      name: "MythrilSpecialistSubAgent"
      display_name: "⚫ Spécialiste Mythril"
      description: "Expert en analyse symbolique Mythril"
      config_path: "agents/formal_verification/sous_agents/mythril_specialist/config.yaml"
      module_path: "agents.formal_verification.sous_agents.mythril_specialist.agent"
      class_name: "MythrilSpecialistSubAgent"
      version: "2.0.0"
      dependencies: []
      initialization_order: 3


# ============================================================================
# CONFIGURATION PRINCIPALE DE VÉRIFICATION
# ============================================================================
verification:
  enabled: true
  timeout_seconds: 3600
  max_rules: 100
  generate_certificates: true
  certificates_path: "./reports/formal"
  specs_path: "./specs"
  logs_path: "./logs/formal"
  supported_tools: ["certora", "halo2", "mythril"]
  default_tool: "certora"
  confidence_threshold: 0.95


# ============================================================================
# CERTORA PROVER
# ============================================================================
certora:
  enabled: true
  prover_version: "5.0"
  optimistic_loop: true
  solc_version: "0.8.19"
  timeout: 1800
  settings:
    rule_sanity: "basic"
    server: "production"
    wait_for_results: true
    multi_assert: true
    prover_args:
      - "-depth": 100
      - "-split": "none"


# ============================================================================
# HALO2 (ZK PROOFS)
# ============================================================================
halo2:
  enabled: false
  circuit_type: "plonk"  # plonk, ultraplonk
  k: 12  # taille du circuit (2^k contraintes)
  timeout: 3600
  proof_system: "groth16"  # groth16, plonk
  backend: "bn256"
  optimization: true


# ============================================================================
# MYTHRIL (SECURITY ANALYSIS)
# ============================================================================
mythril:
  enabled: true
  analysis_depth: 20
  execution_timeout: 300
  solver_timeout: 10000
  max_depth: 128
  create_markdown_report: true
  fire_lasers: false
  parallelism: 4


# ============================================================================
# GÉNÉRATION DE SPÉCIFICATIONS
# ============================================================================
spec_generation:
  auto_generate: true
  template_dir: "./templates/specs"
  inference_depth: 3
  use_llm: false
  llm_model: "ollama:codellama:13b"

  templates:
    erc20: true
    erc721: true
    erc1155: true
    ownable: true
    pausable: true
    reentrancy_guard: true


# ============================================================================
# VÉRIFICATION D'INVARIANTS
# ============================================================================
invariants:
  check_always: true
  generate_from_code: true
  max_invariants: 20
  include:
    - "balance_invariants"
    - "supply_invariants"
    - "access_control"
    - "reentrancy_guards"
    - "pausable_behavior"


# ============================================================================
# CONTRE-EXEMPLES
# ============================================================================
counterexamples:
  generate_on_failure: true
  max_counterexamples: 5
  save_to_file: true
  format: "json"
  include_call_trace: true


# ============================================================================
# CERTIFICATS
# ============================================================================
certificates:
  enabled: true
  formats: ["pdf", "json", "html"]
  include_proof_details: true
  include_counterexamples: true
  include_metadata: true
  template: "certificate_template.html"
  output_path: "./reports/formal/certificates"


# ============================================================================
# MÉTRIQUES & MONITORING
# ============================================================================
metrics:
  enabled: true
  export_to: "monitoring_agent"

  collect:
    - "verifications_total"
    - "verified_count"
    - "failed_count"
    - "timeout_count"
    - "avg_confidence"
    - "tools_available"
    - "avg_duration_ms"

  alerts:
    - metric: "failed_count"
      threshold: 10
      condition: "greater_than"
      window: 3600
      severity: "warning"
    - metric: "avg_confidence"
      threshold: 0.7
      condition: "less_than"
      window: 3600
      severity: "critical"


# ============================================================================
# INTÉGRATIONS
# ============================================================================
integrations:
  monitoring:
    enabled: true
    push_metrics_interval: 60

  learning:
    enabled: true
    provide_training_data: true
    features:
      - "verification_success_rate"
      - "common_failures"
      - "tool_performance"

  smart_contract:
    enabled: true
    auto_verify_on_deploy: false


# ============================================================================
# SYSTÈME
# ============================================================================
system:
  timeout_seconds: 3600
  max_retries: 2
  concurrent_verifications: 2
  log_level: "INFO"
  enable_cache: true
  cache_ttl: 3600


# ============================================================================
# MÉTADONNÉES
# ============================================================================
metadata:
  author: "SmartContractDevPipeline"
  maintainer: "dev@poolsync.io"
  license: "Proprietary"
  tags: ["formal-verification", "certora", "halo2", "mythril", "proofs"]
  capabilities_count: 10
  subagents_count: 3
  last_reviewed: "2026-03-16"
  next_review: "2026-04-16"