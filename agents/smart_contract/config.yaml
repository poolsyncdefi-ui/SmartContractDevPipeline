# ============================================================================
# agents/smart_contract/config.yaml
# Configuration ULTIME de l'Agent Smart Contract - Version 2.5.0
# Développement, audit, optimisation et déploiement de smart contracts sécurisés
# ============================================================================

agent:
  # === IDENTIFICATION ===
  name: "SmartContractAgent"
  class_name: "SmartContractAgent"
  module_path: "agents.smart_contract.agent"
  display_name: "📝 Agent Smart Contract & Blockchain (Ultime)"
  version: "2.5.0"
  description: |-
    Agent spécialisé dans le développement, audit, optimisation et déploiement
    de smart contracts sécurisés et efficaces pour applications DeFi, NFT, Gaming et Web3.
    Expertise multi-langages (Solidity, Vyper, Rust), vérification formelle,
    analyse économique et gestion de la complexité.
  purpose: "Garantir la sécurité, l'efficacité et la fiabilité des smart contracts, même pour les protocoles les plus complexes"

  # === TYPE ET CARACTÉRISTIQUES ===
  agent_type: "concrete"
  abstract: false
  instantiate: true
  enabled: true
  mandatory: true
  singleton: false
  execution_order: 3
  max_concurrent_tasks: 2  # Les contrats complexes nécessitent de l'attention

  # === HÉRITAGE & DÉPENDANCES ===
  extends: "BaseAgent"
  parent: "BaseAgent"
  dependencies:
    - "architect"
    - "coder"
    - "tester"
    - "formal_verification"
    - "fuzzing_simulation"
  initialization_order: 3

  # === RÈGLES SPÉCIFIQUES ANTI-HALLUCINATION ===
  anti_hallucination:
    enabled: true
    confidence_threshold: 0.85  # Légèrement abaissé pour permettre les designs complexes
    base_confidence: 0.7  # Confiance de départ avant validation

    # Vérifications obligatoires avant tout déploiement
    mandatory_checks:
      - "verify_no_reentrancy_vulnerability"
      - "check_integer_overflow_underflow"
      - "validate_access_control_complete"
      - "ensure_proxy_upgrade_safety"
      - "verify_eth_value_handling"
      - "check_timestamp_dependence"
      - "validate_external_call_safety"
      - "ensure_gas_limit_compatibility"
      - "verify_eip_compliance"
      - "check_economic_logic_consistency"

    # Patterns interdits (vulnérabilités critiques)
    forbidden_patterns:
      - pattern: "tx\\.origin"
        reason: "Vulnérabilité de phishing - utiliser msg.sender"
        severity: "critical"
        cwe: "CWE-807"
      - pattern: "delegatecall.*msg\\.data"
        reason: "Risque de corruption d'état"
        severity: "critical"
        cwe: "CWE-670"
      - pattern: "call\\.value.*\\(.*\\)"
        reason: "Risque de réentrance sans mutex"
        severity: "critical"
        cwe: "CWE-841"
      - pattern: "require\\(.*,.*\\);"
        reason: "Message d'erreur manquant - débogage difficile"
        severity: "medium"
      - pattern: "unchecked\\s*\\{.*\\}"
        reason: "Overflow non vérifié - justifier absolument"
        severity: "high"
      - pattern: "block\\.timestamp.*[<>]=.*"
        reason: "Manipulation possible par mineurs (15s)"
        severity: "high"
      - pattern: "assembly\\s*\\{.*\\}"
        reason: "Code non vérifié par analyse statique"
        severity: "medium"
      - pattern: "selfdestruct"
        reason: "Destruction définitive - risque de perte"
        severity: "critical"
      - pattern: "transfer\\(.*\\)"
        reason: "Limitation de gas - utiliser call avec vérification"
        severity: "medium"

    # Gestion de l'incertitude
    uncertainty_handling:
      threshold: 0.8
      markers:
        - comment: "⚠️ VULNÉRABILITÉ POTENTIELLE"
        - comment: "🔍 LOGIQUE À VALIDER"
        - comment: "❓ COMPORTEMENT NON DÉTERMINISTE"
        - comment: "🛡️ MESURE DE SÉCURITÉ À RENFORCER"
        - comment: "📊 LOGIQUE ÉCONOMIQUE COMPLEXE"
      fallback_action: "require_audit"
      require_human_review_if_below: 0.7

    # Gestion de la complexité
    complexity_management:
      enabled: true
      auto_split_threshold: 3  # Complexité >= 3 = découpage automatique
      max_iterations_before_split: 4
      split_strategy: "functional_components"  # Découpage par fonction
      complexity_factors:
        - "interactions_externes"
        - "logique_conditionnelle"
        - "calculs_financiers"
        - "gestion_etat"
      notify_on_split: true

  # === CAPACITÉS SPÉCIFIQUES ===
  capabilities:
    # === CAPACITÉS FONDAMENTALES ===
    - name: "validate_config"
      description: "Valider la configuration des smart contracts"
      confidence_required: 0.9
    - name: "analyze_requirements_deep"
      description: "Analyser les exigences techniques et fonctionnelles"
      confidence_required: 0.85
    - name: "design_contract_architecture_comprehensive"
      description: "Concevoir l'architecture complète avec patterns"
      confidence_required: 0.9
    - name: "estimate_complexity"
      description: "Estimer la complexité d'un contrat"
      confidence_required: 0.8
      output: "complexity_score (1-5)"

    # === CAPACITÉS DE DÉVELOPPEMENT MULTI-LANGAGE ===
    - name: "write_solidity_code_advanced"
      description: "Écrire du code Solidity avancé avec assembly optimisé"
      confidence_required: 0.9
      frameworks: ["hardhat", "foundry", "truffle"]
    - name: "write_vyper_code_advanced"
      description: "Écrire du code Vyper pour contrats sécurisés"
      confidence_required: 0.8
    - name: "write_rust_wasm_contracts"
      description: "Écrire des contrats Rust pour environnements WASM"
      confidence_required: 0.7
    - name: "write_yul_code"
      description: "Écrire du code Yul pour optimisations extrêmes"
      confidence_required: 0.7
    - name: "write_cairo_code"
      description: "Écrire du code Cairo pour StarkNet"
      confidence_required: 0.6

    # === CAPACITÉS DE SÉCURITÉ ===
    - name: "implement_security_measures_robust"
      description: "Implémenter des mesures de sécurité defense-in-depth"
      confidence_required: 0.95
    - name: "perform_slither_analysis"
      description: "Effectuer analyse statique avec Slither"
      confidence_required: 0.9
    - name: "run_echidna_fuzzing"
      description: "Exécuter fuzzing avec Echidna"
      confidence_required: 0.85
    - name: "run_medusa_fuzzing"
      description: "Exécuter fuzzing avancé avec Medusa"
      confidence_required: 0.85
    - name: "detect_reentrancy_patterns"
      description: "Détecter les patterns de réentrance"
      confidence_required: 0.95
    - name: "analyze_access_control"
      description: "Analyser les systèmes de contrôle d'accès"
      confidence_required: 0.95
    - name: "audit_contracts_thorough"
      description: "Auditer les contrats avec outils et revue manuelle"
      confidence_required: 0.95
    - name: "check_well_known_vulnerabilities"
      description: "Vérifier les vulnérabilités connues (SWC Registry)"
      confidence_required: 0.9
    - name: "analyze_private_key_management"
      description: "Analyser la gestion des clés privées"
      confidence_required: 0.9

    # === CAPACITÉS DE VÉRIFICATION FORMELLE ===
    - name: "perform_formal_verification_rigorous"
      description: "Effectuer vérification formelle avec theorem provers"
      confidence_required: 0.95
    - name: "certora_verification"
      description: "Vérification formelle avec Certora"
      confidence_required: 0.95
    - name: "halmos_symbolic_execution"
      description: "Exécution symbolique avec Halmos"
      confidence_required: 0.9
    - name: "scribble_instrumentation"
      description: "Instrumenter le code avec Scribble"
      confidence_required: 0.85
    - name: "dafny_verification"
      description: "Vérification avec Dafny"
      confidence_required: 0.7
    - name: "create_invariants"
      description: "Créer des invariants pour vérification"
      confidence_required: 0.85
    - name: "verify_property_based_tests"
      description: "Vérifier les tests property-based"
      confidence_required: 0.85

    # === CAPACITÉS D'OPTIMISATION ===
    - name: "optimize_gas_usage_extreme"
      description: "Optimiser l'utilisation du gas à l'extrême"
      confidence_required: 0.85
    - name: "optimize_storage_layout"
      description: "Optimiser layout de stockage"
      confidence_required: 0.85
    - name: "optimize_calldata_usage"
      description: "Optimiser l'utilisation des calldata"
      confidence_required: 0.8
    - name: "profile_gas_usage"
      description: "Profiler l'utilisation du gas"
      confidence_required: 0.85
    - name: "minimize_deployment_cost"
      description: "Minimiser les coûts de déploiement"
      confidence_required: 0.8
    - name: "optimize_batch_operations"
      description: "Optimiser les opérations par lots"
      confidence_required: 0.8

    # === CAPACITÉS DE TEST ===
    - name: "write_comprehensive_test_suite"
      description: "Écrire suite de tests complète"
      confidence_required: 0.9
      min_coverage: 95
      required_test_types:
        - "unit"
        - "integration"
        - "property-based"
        - "fuzzing"
        - "invariant"
    - name: "generate_test_coverage_report"
      description: "Générer rapport de couverture de tests"
      confidence_required: 0.7
    - name: "perform_mutation_testing"
      description: "Effectuer du mutation testing"
      confidence_required: 0.8
    - name: "run_fork_tests"
      description: "Exécuter des tests sur fork mainnet"
      confidence_required: 0.85
    - name: "simulate_flash_loan_attacks"
      description: "Simuler des attaques de flash loans"
      confidence_required: 0.9

    # === CAPACITÉS DE DÉPLOIEMENT ===
    - name: "deploy_contracts_multi_network"
      description: "Déployer sur multiples réseaux avec vérification"
      confidence_required: 0.9
    - name: "verify_on_block_explorers"
      description: "Vérifier le code sur les explorateurs"
      confidence_required: 0.85
    - name: "create_deployment_scripts"
      description: "Créer des scripts de déploiement"
      confidence_required: 0.8
    - name: "manage_deployment_addresses"
      description: "Gérer les adresses de déploiement"
      confidence_required: 0.7

    # === CAPACITÉS DE DESIGN ARCHITECTURAL ===
    - name: "implement_upgradeability_patterns"
      description: "Implémenter patterns d'upgradeability sécurisés"
      confidence_required: 0.9
    - name: "design_proxy_patterns"
      description: "Concevoir des patterns proxy"
      confidence_required: 0.9
    - name: "implement_diamond_pattern"
      description: "Implémenter le pattern Diamond (EIP-2535)"
      confidence_required: 0.85
    - name: "create_factory_patterns"
      description: "Créer patterns factory pour déploiement"
      confidence_required: 0.85
    - name: "design_modular_contracts"
      description: "Concevoir des contrats modulaires"
      confidence_required: 0.85

    # === CAPACITÉS D'INTÉGRATION ===
    - name: "implement_erc_standards_compliant"
      description: "Implémenter standards ERC avec compliance totale"
      confidence_required: 0.9
    - name: "create_oracle_integrations"
      description: "Créer intégrations oracles sécurisées"
      confidence_required: 0.9
    - name: "design_bridge_mechanisms"
      description: "Concevoir mécanismes de bridge cross-chain"
      confidence_required: 0.85
    - name: "implement_meta_transactions"
      description: "Implémenter meta-transactions (EIP-2771)"
      confidence_required: 0.85
    - name: "implement_signature_verification"
      description: "Implémenter vérification EIP-712"
      confidence_required: 0.9

    # === CAPACITÉS DE GESTION DES RISQUES ===
    - name: "create_emergency_mechanisms"
      description: "Créer mécanismes d'urgence (pause, recovery)"
      confidence_required: 0.9
    - name: "implement_circuit_breaker_patterns"
      description: "Implémenter circuit breakers"
      confidence_required: 0.9
    - name: "design_insurance_mechanisms"
      description: "Concevoir mécanismes d'assurance"
      confidence_required: 0.85
    - name: "implement_time_locks"
      description: "Implémenter time locks"
      confidence_required: 0.95
    - name: "create_reentrancy_guards"
      description: "Créer guards anti-reentrance"
      confidence_required: 0.95
    - name: "design_multisig_wallets"
      description: "Concevoir multisig wallets"
      confidence_required: 0.9

    # === CAPACITÉS DE TOKENOMICS ===
    - name: "design_token_economics"
      description: "Concevoir tokenomics avec vesting et staking"
      confidence_required: 0.85
    - name: "implement_vesting_schedules"
      description: "Implémenter vesting schedules"
      confidence_required: 0.9
    - name: "design_liquidity_mining"
      description: "Concevoir liquidity mining"
      confidence_required: 0.85
    - name: "implement_reward_distribution"
      description: "Implémenter la distribution de récompenses"
      confidence_required: 0.85
    - name: "calculate_apr_apy"
      description: "Calculer APR/APY pour les protocoles DeFi"
      confidence_required: 0.9
    - name: "design_bonding_curves"
      description: "Concevoir des bonding curves"
      confidence_required: 0.85

    # === CAPACITÉS DE GOUVERNANCE ===
    - name: "implement_governance_mechanisms"
      description: "Implémenter mécanismes de gouvernance"
      confidence_required: 0.9
    - name: "design_voting_systems"
      description: "Concevoir systèmes de vote"
      confidence_required: 0.9
    - name: "implement_delegation"
      description: "Implémenter la délégation de vote"
      confidence_required: 0.85
    - name: "design_timelock_governance"
      description: "Concevoir gouvernance avec timelock"
      confidence_required: 0.9

    # === CAPACITÉS DE DOCUMENTATION ===
    - name: "generate_contract_documentation_complete"
      description: "Générer documentation NatSpec avec diagrammes"
      confidence_required: 0.8
    - name: "generate_technical_whitepaper"
      description: "Générer whitepaper technique"
      confidence_required: 0.7
    - name: "create_audit_readiness_report"
      description: "Créer rapport de préparation à l'audit"
      confidence_required: 0.8

    # === CAPACITÉS D'ANALYSE ÉCONOMIQUE ===
    - name: "simulate_economic_scenarios"
      description: "Simuler des scénarios économiques"
      confidence_required: 0.8
    - name: "analyze_game_theory"
      description: "Analyser les aspects de théorie des jeux"
      confidence_required: 0.8
    - name: "detect_economic_vulnerabilities"
      description: "Détecter les vulnérabilités économiques"
      confidence_required: 0.85
    - name: "assess_protocol_risk"
      description: "Évaluer les risques du protocole"
      confidence_required: 0.85

  # === SOUS-AGENTS SPÉCIALISÉS (LES 4 CORRIGÉS) ===
  subAgents:
    - id: "formal_verification"
      enabled: true
      name: "FormalVerificationSubAgent"
      display_name: "🔬 Vérification Formelle"
      description: "Vérification formelle des smart contracts avec Certora, Halo2 et Mythril"
      config_path: "agents/smart_contract/sous_agents/formal_verification/config.yaml"
      module_path: "agents.smart_contract.sous_agents.formal_verification.agent"
      class_name: "FormalVerificationSubAgent"
      version: "2.0.0"
      dependencies: []
      initialization_order: 1
      capabilities:
        - "formal.generate_invariants"
        - "formal.verify_property"
        - "formal.generate_proof"
        - "formal.get_certificate"
        - "formal.check_status"
        - "formal.list_proofs"
        - "formal.compare_proofs"
      tools: ["certora", "halo2", "mythril"]
      confidence: 0.95
      enabled: true

    - id: "gas_optimizer"
      enabled: true
      name: "GasOptimizerSubAgent"
      display_name: "⛽ Optimisation Gas"
      description: "Optimisation des coûts de gas des smart contracts"
      config_path: "agents/smart_contract/sous_agents/gas_optimizer/config.yaml"
      module_path: "agents.smart_contract.sous_agents.gas_optimizer.agent"
      class_name: "GasOptimizerSubAgent"
      version: "2.0.0"
      dependencies: []
      initialization_order: 2
      capabilities:
        - "gas.analyze_contract"
        - "gas.optimize_contract"
        - "gas.estimate_costs"
        - "gas.suggest_patterns"
        - "gas.compare_versions"
        - "gas.simulate_transaction"
        - "gas.get_optimization_history"
      tools: ["hardhat-gas-reporter", "foundry-gas-snapshots", "tenderly"]
      confidence: 0.9
      enabled: true

    - id: "security_expert"
      enabled: true
      name: "SecurityExpertSubAgent"
      display_name: "🛡️ Expert Sécurité"
      description: "Analyse de sécurité et audit des smart contracts"
      config_path: "agents/smart_contract/sous_agents/security_expert/config.yaml"
      module_path: "agents.smart_contract.sous_agents.security_expert.agent"
      class_name: "SecurityExpertSubAgent"
      version: "2.0.0"
      dependencies: []
      initialization_order: 3
      capabilities:
        - "security.scan_contract"
        - "security.audit_contract"
        - "security.check_vulnerabilities"
        - "security.suggest_fixes"
        - "security.generate_report"
        - "security.get_audit_history"
        - "security.compare_audits"
      tools: ["slither", "mythril", "echidna", "medusa", "securify"]
      confidence: 0.95
      enabled: true

    - id: "solidity_expert"
      enabled: true
      name: "SolidityExpertSubAgent"
      display_name: "🔷 Expert Solidity"
      description: "Développement Solidity avancé et bonnes pratiques"
      config_path: "agents/smart_contract/sous_agents/solidity_expert/config.yaml"
      module_path: "agents.smart_contract.sous_agents.solidity_expert.agent"
      class_name: "SolidityExpertSubAgent"
      version: "2.0.0"
      dependencies: []
      initialization_order: 4
      capabilities:
        - "solidity.generate_contract"
        - "solidity.generate_interface"
        - "solidity.generate_library"
        - "solidity.check_best_practices"
        - "solidity.migrate_version"
        - "solidity.explain_code"
        - "solidity.validate_code"
        - "solidity.get_templates"
      confidence: 0.95
      enabled: true

  # === GESTION DES FRAGMENTS COMPLEXES ===
  complex_fragment_management:
    enabled: true
    detection:
      complexity_threshold: 3
      analyze_dependencies: true
      detect_circular_deps: true
    
    strategies:
      - name: "auto_split"
        enabled: true
        method: "functional_decomposition"
        max_subfragments: 4
      
      - name: "phased_implementation"
        enabled: true
        phases:
          - "core_logic"
          - "security_features"
          - "economic_mechanisms"
          - "optimizations"
      
      - name: "parallel_design"
        enabled: true
        max_parallel_attempts: 3
        vote_on_best_design: true
    
    fallback:
      if_still_failing: "human_expert_review"
      max_iterations_before_fallback: 6

  # === CONFIGURATION DES SMART CONTRACTS ===
  contracts:
    solidity_versions:
      default: "0.8.19"
      supported:
        - "0.4.24"
        - "0.5.17"
        - "0.6.12"
        - "0.7.6"
        - "0.8.0"
        - "0.8.19"
        - "0.8.28"
    
    standards:
      - name: "ERC20"
        description: "Fungible Token Standard"
        openzeppelin: "@openzeppelin/contracts/token/ERC20/ERC20.sol"
      - name: "ERC721"
        description: "Non-Fungible Token Standard"
        openzeppelin: "@openzeppelin/contracts/token/ERC721/ERC721.sol"
      - name: "ERC1155"
        description: "Multi Token Standard"
        openzeppelin: "@openzeppelin/contracts/token/ERC1155/ERC1155.sol"
      - name: "ERC4626"
        description: "Tokenized Vault Standard"
        openzeppelin: "@openzeppelin/contracts/token/ERC20/extensions/ERC4626.sol"
    
    templates:
      path: "templates/smart_contract/"
      list:
        - "erc20_basic"
        - "erc20_votes"
        - "erc721_basic"
        - "erc1155_basic"
        - "simple_storage"
        - "ownable"
    
    compilation:
      default_optimizer_runs: 200
      via_ir: false
      output_selection:
        - "*"
        - "metadata"
        - "evm.bytecode"
        - "evm.deployedBytecode"
        - "abi"

  # === OUTILS DISPONIBLES ===
  tools:
    # === OUTILS DE DÉVELOPPEMENT ===
    - name: "solidity_developer_advanced"
      description: "Développement Solidity avancé"
      validation_required: true
    - name: "vyper_developer"
      description: "Développement Vyper"
      validation_required: true
    
    # === OUTILS DE SÉCURITÉ ===
    - name: "security_auditor_comprehensive"
      description: "Audit de sécurité complet"
      validation_required: true
    - name: "slither_analyzer"
      description: "Analyse statique Slither"
      validation_required: true
    - name: "mythril_analyzer"
      description: "Analyse symbolique Mythril"
      validation_required: true
    - name: "echidna_fuzzer"
      description: "Fuzzing Echidna"
      validation_required: true
    - name: "medusa_fuzzer"
      description: "Fuzzing avancé Medusa"
      validation_required: true
    
    # === OUTILS D'OPTIMISATION ===
    - name: "gas_optimizer_extreme"
      description: "Optimisation gas extrême"
      validation_required: true
    - name: "storage_layout_optimizer"
      description: "Optimisation stockage"
      validation_required: true
    
    # === OUTILS DE VÉRIFICATION FORMELLE ===
    - name: "formal_verification_toolkit"
      description: "Toolkit vérification formelle"
      validation_required: true
    - name: "certora_prover"
      description: "Vérification Certora"
      validation_required: true
    
    # === OUTILS DE TEST ===
    - name: "test_generator_property_based"
      description: "Génération tests property-based"
      validation_required: true
    - name: "foundry_test_runner"
      description: "Exécuteur de tests Foundry"
      validation_required: true
    
    # === OUTILS DE DÉPLOIEMENT ===
    - name: "deployment_automation_multi_chain"
      description: "Automatisation déploiement multi-chaînes"
      validation_required: true
    - name: "contract_verifier"
      description: "Vérification sur explorateurs"
      validation_required: true

  # === OUTPUTS PRODUITS ===
  outputs:
    - name: "solidity_contracts_production_ready"
      type: "code"
      format: "solidity"
      validation: "compilation+security"
    - name: "vyper_contracts"
      type: "code"
      format: "vyper"
      validation: "compilation"
    
    - name: "security_audit_reports_detailed"
      type: "report"
      format: "markdown/pdf"
      validation: "findings_classification"
    - name: "gas_optimization_reports"
      type: "report"
      format: "json/markdown"
      validation: "benchmark"
    - name: "formal_verification_certificates"
      type: "certificate"
      format: "pdf"
      validation: "proof_validity"
    
    - name: "comprehensive_test_suites"
      type: "code"
      format: "javascript/solidity"
      validation: "coverage+execution"
    - name: "test_coverage_report"
      type: "report"
      format: "html"
      validation: "threshold_check"
    
    - name: "deployment_scripts_multi_network"
      type: "code"
      format: "javascript"
      validation: "execution"
    - name: "verified_contract_addresses"
      type: "data"
      format: "json"
      validation: "explorer_check"
    
    - name: "contract_documentation_complete"
      type: "documentation"
      format: "markdown/html"
      validation: "completeness"
    - name: "audit_readiness_report"
      type: "report"
      format: "markdown"
      validation: "checklist_complete"

  # === RÈGLES DE VALIDATION ===
  validation_rules:
    - name: "must_pass_all_security_audits_zero_critical"
      severity: "critical"
