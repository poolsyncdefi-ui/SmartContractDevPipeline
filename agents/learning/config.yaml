# agents/learning/config.yaml
# Version enrichie avec toutes les sections avancées
# ============================================================================

agent:
  # === IDENTIFICATION ===
  name: "learning"
  class_name: "LearningAgent"
  module_path: "agents.learning.agent"
  display_name: "🧠 Agent Learning"
  description: "Agent responsable de l'apprentissage automatique pour l'optimisation des performances et la détection d'anomalies"
  extends: "BaseAgent"
  version: "2.0.0"

  # === TYPE ET STATUT ===
  agent_type: "concrete"
  abstract: false
  instantiate: true
  enabled: true
  mandatory: false

  # === DÉPENDANCES ===
  dependencies: 
    - "tester"
    - "formal_verification"
    - "monitoring"
    - "communication"
    - "storage"
  initialization_order: 130
  parent: "BaseAgent"
  purpose: "Apprentissage automatique et optimisation intelligente du pipeline"

  # === CAPACITÉS ÉTENDUES ===
  capabilities:
    # Prédictions
    - name: "gas_prediction"
      description: "Prédit la consommation de gas des smart contracts"
      version: "1.0.0"
      parameters: ["contract_features"]
      return_type: "Dict[str, Any]"
      
    - name: "vulnerability_classification"
      description: "Classifie les vulnérabilités potentielles"
      version: "1.0.0"
      parameters: ["contract_code"]
      return_type: "Dict[str, Any]"
      
    - name: "test_optimization"
      description: "Optimise les stratégies de test"
      version: "1.0.0"
      parameters: ["contract_type", "history"]
      return_type: "Dict[str, Any]"
      
    - name: "anomaly_detection"
      description: "Détecte les anomalies dans les métriques"
      version: "1.0.0"
      parameters: ["metrics"]
      return_type: "Dict[str, Any]"
      
    - name: "contract_quality_scoring"
      description: "Génère un score de qualité pour les contrats"
      version: "1.0.0"
      parameters: ["contract_data"]
      return_type: "Dict[str, Any]"
      
    - name: "trend_forecast"
      description: "Prévoit les tendances de performance"
      version: "1.0.0"
      parameters: ["historical_data", "horizon"]
      return_type: "Dict[str, Any]"
      
    - name: "parameter_tuning"
      description: "Ajuste automatiquement les paramètres"
      version: "1.0.0"
      parameters: ["model_name", "target_metric"]
      return_type: "Dict[str, Any]"
      
    - name: "insight_generation"
      description: "Génère des insights à partir des données"
      version: "1.0.0"
      parameters: ["data_source", "min_confidence"]
      return_type: "List[Insight]"

# ============================================================================
# CONFIGURATION DE L'APPRENTISSAGE (enrichie)
# ============================================================================
learning:
  enabled: true
  auto_train: true
  training_interval: 3600  # secondes (1 heure)
  min_samples_for_training: 50
  max_examples_per_task: 10000
  model_storage_path: "./agents/learning/data/models"
  data_storage_path: "./agents/learning/data/training"
  reports_path: "./reports/learning"
  experiments_path: "./agents/learning/experiments"
  default_model: "ensemble"
  enable_sklearn: true
  simulation_mode: false
  
  # === FEATURE STORE ===
  feature_store:
    path: "./agents/learning/data/features"
    auto_save: true
    save_interval: 300  # secondes
    max_features_per_set: 50
  
  # === GESTION DES DONNÉES ===
  data_management:
    retention_days: 90
    compress_old_data: true
    backup_enabled: true
    backup_interval_hours: 24
    max_disk_usage_gb: 10
    cleanup_threshold_gb: 8

# ============================================================================
# CONFIGURATION DES MODÈLES (enrichie)
# ============================================================================
models:
  # === PRÉDICTEUR DE GAS ===
  gas_predictor:
    enabled: true
    type: "ensemble"
    version: "1.0.0"
    n_estimators: 300
    max_depth: 15
    min_samples_split: 5
    test_size: 0.2
    random_state: 42
    features:
      - "contract_size_bytes"
      - "num_functions"
      - "num_variables"
      - "num_loops"
      - "num_requires"
      - "num_events"
      - "uses_assembly"
      - "solidity_version_major"
      - "complexity_score"
      - "num_modifiers"
      - "num_external_calls"
    target: "gas_consumption"
    
    # Hyperparamètres avancés
    hyperparameters:
      min_samples_leaf: 2
      max_features: "sqrt"
      bootstrap: true
      oob_score: true
    
    # Métriques de performance
    metrics:
      - "mae"
      - "mse"
      - "rmse"
      - "r2_score"
      - "mape"

  # === CLASSIFIEUR DE VULNÉRABILITÉS ===
  vulnerability_classifier:
    enabled: true
    type: "ensemble"
    version: "1.0.0"
    n_estimators: 200
    max_depth: 15
    classes:
      - "reentrancy"
      - "integer_overflow"
      - "access_control"
      - "timestamp_dependency"
      - "front_running"
      - "gas_issues"
      - "logic_error"
      - "delegatecall_unsafe"
      - "tx_origin_usage"
      - "unchecked_low_level_calls"
      - "denial_of_service"
      - "flash_loan_attack"
    multi_label: true
    threshold: 0.35
    random_state: 42
    
    # Métriques
    metrics:
      - "accuracy"
      - "precision"
      - "recall"
      - "f1_score"
      - "auc_roc"
    
    # Seuils de risque
    risk_thresholds:
      critical: 0.7
      high: 0.5
      medium: 0.3
      low: 0.1

  # === OPTIMISEUR DE TESTS ===
  test_optimizer:
    enabled: true
    type: "gradient_boosting"
    version: "1.0.0"
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 5
    subsample: 0.8
    random_state: 42
    
    # Types de tests
    test_types:
      unit:
        base_time: 10
        priority_weight: 1.0
      integration:
        base_time: 20
        priority_weight: 1.2
      fuzzing:
        base_time: 30
        priority_weight: 1.5
      formal:
        base_time: 40
        priority_weight: 1.8
      gas:
        base_time: 15
        priority_weight: 0.8
      security:
        base_time: 35
        priority_weight: 2.0

  # === DÉTECTEUR D'ANOMALIES ===
  anomaly_detector:
    enabled: true
    type: "isolation_forest"
    version: "1.0.0"
    contamination: 0.1
    n_estimators: 100
    max_samples: "auto"
    bootstrap: false
    random_state: 42
    
    # Seuils
    thresholds:
      warning: 0.7
      critical: 0.9
    
    # Types d'anomalies à détecter
    anomaly_types:
      - "gas_spike"
      - "performance_degradation"
      - "security_regression"
      - "test_flakiness"
      - "concept_drift"

  # === ANALYSE DE TENDANCES ===
  trend_analyzer:
    enabled: true
    type: "prophet"
    version: "1.0.0"
    seasonality_mode: "multiplicative"
    yearly_seasonality: true
    weekly_seasonality: true
    daily_seasonality: false
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10.0
    
    # Horizons de prédiction (en jours)
    forecast_horizons:
      short_term: 7
      medium_term: 30
      long_term: 90

# ============================================================================
# CONFIGURATION DES INSIGHTS (enrichie)
# ============================================================================
insights:
  enabled: true
  min_confidence: "C"  # A, B, C, D, E
  auto_implement: false
  max_insights_per_day: 10
  notification_enabled: true
  storage_path: "./agents/learning/data/insights"
  
  # Seuils par niveau de confiance
  confidence_thresholds:
    A: 0.95  # > 95%
    B: 0.85  # 85-95%
    C: 0.70  # 70-85%
    D: 0.50  # 50-70%
    E: 0.00  # < 50%
  
  # Catégories d'insights
  categories:
    - "model_improvement"
    - "vulnerability_trend"
    - "performance_optimization"
    - "test_strategy"
    - "security_recommendation"
    - "gas_optimization"
    - "architecture_insight"
  
  # Actions automatiques possibles
  auto_actions:
    - "update_model"
    - "retrain_model"
    - "adjust_thresholds"
    - "generate_report"
    - "notify_team"

# ============================================================================
# SYSTÈME (enrichi)
# ============================================================================
system:
  # === PERFORMANCE ===
  timeout_seconds: 300
  max_retries: 3
  concurrent_tasks: 2
  max_queue_size: 100
  task_priority_levels: [0, 1, 2]  # 0=normal, 1=haute, 2=critique
  
  # === LOGGING ===
  log_level: "INFO"
  log_file: "logs/learning_agent.log"
  log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_max_size_mb: 100
  log_backup_count: 5
  
  # === MÉTRIQUES ===
  enable_metrics: true
  metrics_interval: 60  # secondes
  metrics_storage: "./agents/learning/data/metrics"
  export_metrics:
    - "console"
    - "file"
    - "prometheus"  # si disponible
  
  # === HEALTH CHECKS ===
  enable_health_checks: true
  health_check_interval: 30  # secondes
  health_check_endpoint: "/health"
  
  # === CACHE ===
  cache_enabled: true
  cache_ttl: 300  # secondes
  cache_max_size_mb: 100
  cache_type: "memory"  # memory, redis, file

# ============================================================================
# PERSISTANCE (enrichie)
# ============================================================================
persistence:
  # === SAUVEGARDE ===
  save_models_on_shutdown: true
  save_training_data_on_shutdown: true
  save_insights_on_shutdown: true
  save_metrics_on_shutdown: true
  
  # === SAUVEGARDE AUTOMATIQUE ===
  auto_save_interval: 300  # secondes
  backup_interval_hours: 24
  backup_retention_days: 7
  
  # === FORMATS ===
  serialization_format: "pickle"  # pickle, json, joblib
  compression: true
  encryption: false
  
  # === VERSIONNAGE ===
  version_control: true
  max_versions_per_model: 5
  keep_best_model_only: false

# ============================================================================
# COMMUNICATION (enrichie)
# ============================================================================
communication:
  # === MESSAGES ===
  message_prefix: "learning"
  supported_message_types:
    - "predict_gas"
    - "classify_vulnerability"
    - "optimize_tests"
    - "detect_anomalies"
    - "quality_score"
    - "get_insights"
    - "add_training_example"
    - "get_stats"
    - "pause"
    - "resume"
    - "shutdown"
  
  # === BROADCAST ===
  broadcast_insights: true
  broadcast_targets:
    - "orchestrator"
    - "monitoring"
    - "architect"
    - "tester"
  
  # === RÉPONSES ===
  response_timeout: 30  # secondes
  max_retries_on_failure: 3
  require_ack: true

# ============================================================================
# API (optionnelle)
# ============================================================================
api:
  enabled: false
  host: "127.0.0.1"
  port: 8013
  endpoints:
    - "/api/v1/learning/predict/gas"
    - "/api/v1/learning/classify"
    - "/api/v1/learning/optimize/tests"
    - "/api/v1/learning/anomalies"
    - "/api/v1/learning/quality"
    - "/api/v1/learning/insights"
    - "/api/v1/learning/stats"
  
  # === AUTHENTIFICATION ===
  auth_required: false
  api_key_header: "X-API-Key"
  
  # === RATE LIMITING ===
  rate_limit: "100/minute"
  rate_limit_by_ip: true

# ============================================================================
# SÉCURITÉ
# ============================================================================
security:
  # === DONNÉES SENSIBLES ===
  mask_sensitive_data: true
  sensitive_fields:
    - "private_key"
    - "password"
    - "token"
    - "api_key"
  
  # === VALIDATION ===
  validate_inputs: true
  validate_outputs: false
  max_input_size_kb: 1024
  
  # === SANDBOX ===
  sandbox_mode: true
  allowed_imports:
    - "numpy"
    - "pandas"
    - "sklearn.*"
    - "pickle"