# ============================================================================
# WORKFLOW DE DÉLÉGATION (AVEC CONFLIT RESOLUTION)
# ============================================================================
delegation_workflow:
  steps:
    - step: "identify_domains"
      description: "Identifier les domaines métier concernés"
      input: "requirements"
      timeout: 2
      parallel: true
      
    - step: "select_subagents"
      description: "Sélectionner les sous-agents via domain_mapping"
      validation: "subagent_exists"
      fallback: "use_general_architect"
      
    - step: "parallel_delegation"
      description: "Déléguer en parallèle aux sous-agents"
      timeout: 60
      max_concurrent: 5
      retry_on_failure: true
      retry_count: 2
      
    - step: "receive_designs"
      description: "Recevoir les conceptions des sous-agents"
      timeout: 90
      expected_count: "variable"
      
    - step: "detect_conflicts"
      description: "Détecter les conflits entre conceptions"
      conflict_detection: "automatic"
      conflict_types:
        - "overlapping_boundaries"
        - "contradictory_constraints"
        - "inconsistent_data_models"
        - "security_gaps"
        
    - step: "resolve_conflicts"
      description: "Résoudre les conflits détectés"
      strategy: "priority_based"
      resolution_rules:
        - "security_overrides_performance"
        - "regulatory_overrides_all"
        - "cost_optimization_after_security"
        
    - step: "merge_designs"
      description: "Fusionner les conceptions validées"
      validation: "integration_coherent"
      
    - step: "validate_cross_cutting"
      description: "Valider les préoccupations transversales"
      concerns:
        - "security"
        - "observability"
        - "resilience"
        - "scalability"
        
    - step: "generate_adrs"
      description: "Générer les Architecture Decision Records"
      required: true
      
    - step: "peer_review"
      description: "Soumettre à revue par les pairs"
      condition: "complexity > 7"
      reviewers: ["senior_architect", "security_architect"]

# ============================================================================
# ADR (ARCHITECTURE DECISION RECORDS) TEMPLATE
# ============================================================================
adr_template:
  required_sections:
    - "title"
    - "status"
    - "context"
    - "decision"
    - "consequences"
    - "alternatives_considered"
    - "trade_offs"
    - "risks"
    - "mitigations"
    - "compliance_impact"
    - "cost_impact"
    - "reviewers"
    - "approval_date"
  
  status_values:
    - "proposed"
    - "accepted"
    - "deprecated"
    - "superseded"
  
  auto_generate: true
  require_approval: true

# ============================================================================
# ALERTING ET MONITORING
# ============================================================================
alerting:
  enabled: true
  channels:
    - type: "slack"
      channel: "#architecture-alerts"
      severity: ["critical", "high"]
    - type: "pagerduty"
      severity: ["critical"]
      
  conditions:
    - metric: "design_failure_rate"
      threshold: 0.10
      window_minutes: 5
      severity: "high"
    - metric: "delegation_timeout_rate"
      threshold: 0.05
      window_minutes: 10
      severity: "medium"
    - metric: "validation_rejection_rate"
      threshold: 0.20
      window_minutes: 15
      severity: "medium"