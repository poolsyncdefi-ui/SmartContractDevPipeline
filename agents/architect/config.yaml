# ============================================================================
# agents/architect/config.yaml
# Configuration ULTIME RENFORCÉE de l'Agent Architect - Version 4.0.0
# Expert en architecture système avec capacités cognitives avancées
# Optimisé pour : performance, rigueur architecturale, délégation intelligente
# ============================================================================

agent:
  # === IDENTIFICATION ET MÉTADONNÉES ===
  name: "ArchitectAgent"
  class_name: "ArchitectAgent"
  module_path: "agents.architect.agent"
  display_name: "🏛️ Agent Architecte Système - Expert en Architecture d'Entreprise"
  version: "4.0.0"
  description: |-
    Agent architecte de niveau expert, capable de concevoir des architectures
    d'entreprise complexes, scalables et résilientes. Spécialisé dans :
    - Architecture d'entreprise et systèmes distribués
    - Architecture cloud native et hybrid
    - Architecture événementielle et microservices
    - Architecture de sécurité Zero Trust
    - Architecture de données et IA/ML
    - Architecture blockchain et Web3
    Orchestration intelligente des sous-agents métier spécialisés.
  purpose: "Concevoir des architectures système d'excellence, optimisées, résilientes et conformes aux standards internationaux"
  
  # === TYPE ET CARACTÉRISTIQUES ===
  agent_type: "concrete"
  abstract: false
  instantiate: true
  enabled: true
  mandatory: true
  singleton: false
  execution_order: 1
  initialization_order: 1
  priority: "critical"  # Priorité système maximale

  # === HÉRITAGE ET DÉPENDANCES ===
  extends: "BaseAgent"
  parent: "BaseAgent"
  dependencies:
    - "communication"
    - "registry"
    - "monitoring"
    - "learning"        # Pour l'apprentissage des patterns architecturaux
  initialization_order: 1

  # === RÈGLES SPÉCIFIQUES ANTI-HALLUCINATION (RENFORCÉES) ===
  anti_hallucination:
    enabled: true
    confidence_threshold: 0.90      # Élevé pour l'architecture critique
    base_confidence: 0.75
    strict_mode: true               # Mode strict activé

    # Vérifications obligatoires (renforcées)
    mandatory_checks:
      - "verify_architecture_coherence"
      - "check_pattern_consistency"
      - "validate_scalability_claims"
      - "detect_utopian_designs"
      - "ensure_technology_feasibility"
      - "verify_cost_estimates_plausible"
      - "check_compliance_requirements"
      - "validate_regulatory_compliance"
      - "verify_security_standards"
      - "check_domain_specific_constraints"
      - "verify_circuit_breaker_integration"
      - "validate_domain_expertise_usage"
      - "check_nfr_fulfillment"           # Non-functional requirements
      - "validate_disaster_recovery_plan"
      - "verify_observability_coverage"
      - "check_deployment_strategy"
      - "validate_data_sovereignty"
      - "verify_sla_compliance"
      - "check_technical_debt_estimate"

    # Patterns de conceptions risquées (renforcés)
    risky_patterns:
      - pattern: "silver bullet"
        reason: "Solution universelle inexistante - nécessite des compromis documentés"
        severity: "critical"
      - pattern: "ignorer les contraintes"
        reason: "Design non réaliste - contraintes non adressées"
        severity: "critical"
      - pattern: "pas de trade-offs"
        reason: "Toute architecture implique des compromis explicites"
        severity: "critical"
      - pattern: "over-engineering"
        reason: "Complexité excessive pour le besoin réel"
        severity: "high"
      - pattern: "under-engineering"
        reason: "Ne répondra pas aux exigences futures ou scalabilité"
        severity: "high"
      - pattern: "vendor lock-in"
        reason: "Dépendance critique non justifiée par des gains substantiels"
        severity: "high"
      - pattern: "single point of failure"
        reason: "Absence de redondance - risque de perte de service"
        severity: "critical"
      - pattern: "non-compliance"
        reason: "Non-conformité réglementaire - risque juridique"
        severity: "critical"
      - pattern: "no_circuit_breaker"
        reason: "Absence de protection contre les défaillances en cascade"
        severity: "high"
      - pattern: "no_monitoring"
        reason: "Absence d'observabilité - système en boîte noire"
        severity: "high"
      - pattern: "no_disaster_recovery"
        reason: "Absence de plan de reprise - risque métier majeur"
        severity: "critical"
      - pattern: "tight_coupling"
        reason: "Couplage fort entre composants - impact des changements élevé"
        severity: "high"
      - pattern: "distributed_monolith"
        reason: "Microservices déployés comme un monolithe - perte des bénéfices"
        severity: "high"
      - pattern: "data_silo"
        reason: "Données cloisonnées non partageables"
        severity: "medium"

    # Gestion de l'incertitude (renforcée)
    uncertainty_handling:
      threshold: 0.75
      markers:
        - doc: "⚠️ HYPOTHÈSE À VALIDER AVEC L'ÉQUIPE MÉTIER"
        - doc: "🔍 COMPROMIS À ÉVALUER EN ARCHITECTURE REVIEW"
        - doc: "❓ IMPACT INCERTAIN - ANALYSE SUPPLÉMENTAIRE REQUISE"
        - doc: "📊 DONNÉES MANQUANTES - ESTIMATION BASÉE SUR L'EXPÉRIENCE"
        - doc: "⚖️ À VALIDER RÉGLEMENTAIREMENT AVEC L'ÉQUIPE JURIDIQUE"
        - doc: "🏷️ À VALIDER AVEC LE DOMAINE MÉTIER"
      fallback_action: "flag_for_review"
      require_human_review_if_below: 0.65
      require_peer_review_if_below: 0.80
      escalation_path: "chief_architect"

  # === CAPACITÉS FONDAMENTALES (RENFORCÉES) ===
  capabilities:
    # Architecture système générale (19)
    - name: "DESIGN_SYSTEM_ARCHITECTURE"
      description: "Concevoir l'architecture système globale"
    - name: "DESIGN_MICROSERVICES"
      description: "Concevoir une architecture microservices"
    - name: "DESIGN_CLOUD_INFRASTRUCTURE"
      description: "Concevoir l'infrastructure cloud"
    - name: "DELEGATE_TO_DOMAIN"
      description: "Déléguer aux sous-agents métier"
    - name: "VALIDATE_CONFIG"
      description: "Valider la configuration du projet"
      confidence_required: 0.8
      execution_time_ms: 100
    - name: "ANALYZE_BUSINESS_REQUIREMENTS"
      description: "Analyser les exigences métier avec identification des drivers"
      confidence_required: 0.85
      execution_time_ms: 500
    - name: "ANALYZE_TECHNICAL_CONSTRAINTS"
      description: "Analyser les contraintes techniques et leur impact"
      confidence_required: 0.85
      execution_time_ms: 300
    - name: "DESIGN_SYSTEM_ARCHITECTURE"
      description: "Concevoir l'architecture système globale avec vue C4"
      confidence_required: 0.9
      execution_time_ms: 2000
    - name: "DESIGN_CLOUD_INFRASTRUCTURE"
      description: "Concevoir l'infrastructure cloud (multi-cloud/hybrid)"
      confidence_required: 0.85
      execution_time_ms: 1500
    - name: "DESIGN_MICROSERVICES_ECOSYSTEM"
      description: "Concevoir l'écosystème microservices avec bounded contexts"
      confidence_required: 0.9
      execution_time_ms: 1800
    - name: "DESIGN_API_GATEWAY"
      description: "Concevoir l'API Gateway avec stratégie de routing"
      confidence_required: 0.85
      execution_time_ms: 800
    - name: "DESIGN_DATA_ARCHITECTURE"
      description: "Concevoir l'architecture des données (polyglot persistence)"
      confidence_required: 0.85
      execution_time_ms: 1500
    - name: "DESIGN_MONITORING_OBSERVABILITY"
      description: "Concevoir le monitoring et l'observabilité (metrics, logs, traces)"
      confidence_required: 0.8
      execution_time_ms: 1000
    - name: "DESIGN_DISASTER_RECOVERY"
      description: "Concevoir le plan de reprise d'activité (RTO/RPO)"
      confidence_required: 0.85
      execution_time_ms: 1200
    - name: "DESIGN_SCALABILITY_STRATEGY"
      description: "Concevoir la stratégie de scalabilité (horizontal/vertical)"
      confidence_required: 0.9
      execution_time_ms: 1000
    - name: "DESIGN_SECURITY_ARCHITECTURE"
      description: "Concevoir l'architecture de sécurité Zero Trust"
      confidence_required: 0.95
      execution_time_ms: 2000
    - name: "DESIGN_EVENT_DRIVEN_ARCHITECTURE"
      description: "Concevoir l'architecture événementielle"
      confidence_required: 0.9
      execution_time_ms: 1500
    - name: "DESIGN_SERVERLESS_ARCHITECTURE"
      description: "Concevoir l'architecture serverless"
      confidence_required: 0.85
      execution_time_ms: 1200
    - name: "DESIGN_CONTAINER_ORCHESTRATION"
      description: "Concevoir l'orchestration containers (K8s, nomad)"
      confidence_required: 0.85
      execution_time_ms: 1000

    # Évaluation et optimisation (6)
    - name: "REVIEW_ARCHITECTURE_DECISIONS"
      description: "Réviser les décisions d'architecture (ADR)"
      confidence_required: 0.9
      execution_time_ms: 800
    - name: "OPTIMIZE_ARCHITECTURE_PERFORMANCE"
      description: "Optimiser les performances architecturales"
      confidence_required: 0.85
      execution_time_ms: 1200
    - name: "OPTIMIZE_ARCHITECTURE_COST"
      description: "Optimiser les coûts architecturaux (FinOps)"
      confidence_required: 0.8
      execution_time_ms: 1000
    - name: "OPTIMIZE_ARCHITECTURE_RELIABILITY"
      description: "Optimiser la fiabilité et résilience"
      confidence_required: 0.9
      execution_time_ms: 1200
    - name: "OPTIMIZE_ARCHITECTURE_SECURITY"
      description: "Optimiser la posture de sécurité"
      confidence_required: 0.95
      execution_time_ms: 1500
    - name: "DOCUMENT_ARCHITECTURE_COMPREHENSIVE"
      description: "Documenter l'architecture de façon exhaustive (C4 + ADR)"
      confidence_required: 0.7
      execution_time_ms: 3000

    # Délégation et orchestration (5)
    - name: "DELEGATE_TO_DOMAIN_AGENT"
      description: "Déléguer une tâche à un sous-agent métier spécialisé"
      confidence_required: 0.9
      execution_time_ms: 200
    - name: "ORCHESTRATE_MULTI_DOMAIN"
      description: "Orchestrer des conceptions multi-domaines complexes"
      confidence_required: 0.85
      execution_time_ms: 1500
    - name: "MERGE_DOMAIN_DESIGNS"
      description: "Fusionner les conceptions de plusieurs sous-agents"
      confidence_required: 0.85
      execution_time_ms: 800
    - name: "RESOLVE_DOMAIN_CONFLICTS"
      description: "Résoudre les conflits entre conceptions de domaines différents"
      confidence_required: 0.9
      execution_time_ms: 1000
    - name: "VALIDATE_CROSS_CUTTING_CONCERNS"
      description: "Valider les préoccupations transversales (sécurité, monitoring, etc.)"
      confidence_required: 0.9
      execution_time_ms: 600

  # === CONFIGURATION LLM AVANCÉE (OPTIMISÉE) ===
  llm_config:
    enabled: true
    model: "ollama:llama2:13b"
    fallback_model: "ollama:mixtral:8x7b"
    temperature: 0.12                    # Très bas pour la rigueur architecturale
    max_tokens: 12000
    top_p: 0.92
    frequency_penalty: 0.1
    presence_penalty: 0.1

    anti_hallucination_params:
      repetition_penalty: 1.18
      length_penalty: 1.05
      no_repeat_ngram_size: 4
      do_sample: false
      num_beams: 6                        # Augmenté pour meilleure qualité
      early_stopping: true

    response_validation:
      require_consistency_check: true
      require_pattern_validation: true
      require_regulatory_check: true
      require_cost_validation: true
      require_security_validation: true
      max_attempts: 4
      fallback_model: "ollama:mixtral:8x7b"

    caching:
      enabled: true
      ttl_seconds: 3600
      max_cache_size: 500

    context_window:
      max_tokens: 8192
      reserved_for_output: 2048

  # === OUTILS DISPONIBLES (RENFORCÉS) ===
  tools:
    - name: "architecture_designer"
      description: "Conçoit l'architecture globale"
      priority: 1
      required: true
    - name: "cloud_designer"
      description: "Conçoit l'infrastructure cloud"
      priority: 2
    - name: "microservices_designer"
      description: "Conçoit l'écosystème microservices"
      priority: 2
    - name: "event_driven_designer"
      description: "Conçoit l'architecture événementielle"
      priority: 2
    - name: "data_architect"
      description: "Conçoit l'architecture des données"
      priority: 2
    - name: "security_architect"
      description: "Conçoit l'architecture de sécurité"
      priority: 1
      required: true
    - name: "diagram_generator"
      description: "Génère des diagrammes d'architecture (C4, UML)"
      priority: 3
    - name: "cost_optimizer"
      description: "Optimise les coûts architecturaux"
      priority: 3
    - name: "performance_analyzer"
      description: "Analyse les performances"
      priority: 3
    - name: "reliability_analyzer"
      description: "Analyse la fiabilité et résilience"
      priority: 2
    - name: "domain_delegator"
      description: "Délègue aux sous-agents métier"
      priority: 1
      required: true
    - name: "design_merger"
      description: "Fusionne les designs multi-domaines"
      priority: 2
    - name: "adr_generator"
      description: "Génère des Architecture Decision Records"
      priority: 2
    - name: "risk_analyzer"
      description: "Analyse les risques architecturaux"
      priority: 2

  # === RÈGLES DE VALIDATION (RENFORCÉES) ===
  validation_rules:
    - name: "design_must_be_coherent"
      severity: "critical"
      action_on_failure: "reject"
      auto_correct: false
      validation_function: "validate_coherence"
    - name: "domain_delegation_valid"
      severity: "high"
      action_on_failure: "fallback_to_general"
      auto_correct: true
    - name: "no_single_point_of_failure"
      severity: "critical"
      action_on_failure: "reject"
      auto_correct: false
    - name: "cost_estimates_plausible"
      severity: "medium"
      action_on_failure: "warn"
      auto_correct: false
    - name: "security_requirements_met"
      severity: "critical"
      action_on_failure: "reject"
      auto_correct: false
    - name: "regulatory_compliance"
      severity: "critical"
      action_on_failure: "reject"
      auto_correct: false
    - name: "scalability_proven"
      severity: "high"
      action_on_failure: "warn"
      auto_correct: false
    - name: "disaster_recovery_defined"
      severity: "critical"
      action_on_failure: "reject"
      auto_correct: false
    - name: "observability_coverage"
      severity: "high"
      action_on_failure: "warn"
      auto_correct: true
      min_coverage: 0.8
    - name: "technical_debt_estimated"
      severity: "medium"
      action_on_failure: "warn"
      auto_correct: false
    - name: "cross_cutting_concerns_validated"
      severity: "high"
      action_on_failure: "reject"
      auto_correct: false

  # === MÉTRIQUES DE QUALITÉ (RENFORCÉES) ===
  service_quality_metrics:
    design_quality_score:
      target: 0.95
      min_acceptable: 0.85
      measurement_window: "30d"
      action_if_below: "quality_review"
    delegation_success_rate:
      target_percent: 99.8
      min_acceptable: 99.0
      action_if_below: "investigate"
    design_completion_time:
      target_seconds: 30
      max_seconds: 120
      p95_max_seconds: 90
    architecture_review_approval_rate:
      target_percent: 95
      measurement_window: "30d"
    technical_debt_ratio:
      target: 0.10
      max: 0.25
    cost_estimate_accuracy:
      target_percent: 85
      measurement_window: "90d"
    security_posture_score:
      target: 0.95
      min: 0.85

  # === PERFORMANCE OPTIMISATION ===
  performance:
    max_concurrent_designs: 5
    max_concurrent_delegations: 10
    design_queue_size: 50
    cache_enabled: true
    cache_ttl_seconds: 3600
    parallel_processing: true
    max_parallel_domains: 3
    timeout_seconds: 120
    circuit_breaker:
      failure_threshold: 5
      timeout_seconds: 60
      half_open_timeout: 30

  # === CACHING STRATÉGIE ===
  caching:
    enabled: true
    strategy: "lru"
    max_size: 500
    ttl_seconds: 7200
    persist_to_disk: true
    cache_keys:
      - "design_patterns"
      - "templates"
      - "domain_mappings"

  # === APPRENTISSAGE CONTINU ===
  learning:
    enabled: true
    feedback_loop: true
    pattern_learning: true
    improvement_threshold: 0.05
    review_frequency_hours: 24
    export_metrics_to: "learning_agent"

  # === ENVIRONNEMENTS ===
  environments:
    development:
      enabled: true
      llm_enabled: true
      delegation_timeout: 60
      validation_strictness: "normal"
      caching_enabled: true
    staging:
      enabled: true
      llm_enabled: true
      delegation_timeout: 45
      validation_strictness: "strict"
      caching_enabled: true
    production:
      enabled: true
      llm_enabled: true
      delegation_timeout: 30
      validation_strictness: "critical"
      caching_enabled: true
      require_domain_validation: true
      require_security_review: true
      require_cost_validation: true
      require_peer_review: true

  # === MÉTADONNÉES ===
  metadata:
    author: "SmartContractDevPipeline"
    maintainer: "architect-team@poolsync.io"
    license: "Proprietary"
    tags: [
      "architecture", "system-design", "orchestration", "microservices",
      "cloud-native", "security", "resilience", "c4-model", "adr",
      "enterprise-architecture", "solution-architecture"
    ]
    capabilities_count: 26
    subagents_count: 18
    design_patterns_count: 50
    last_reviewed: "2026-03-24"
    next_review: "2026-04-24"
    version_history:
      - version: "4.0.0"
        date: "2026-03-24"
        changes: "Optimisation performance, renforcement validation, amélioration délégation"
      - version: "3.0.0"
        date: "2026-03-05"
        changes: "Alignement structure, intégration circuit breaker"

