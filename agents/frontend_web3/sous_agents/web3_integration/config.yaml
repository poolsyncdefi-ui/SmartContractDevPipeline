# ============================================================================
# agents/frontend_web3/sous_agents/web3_integration/config.yaml
# Configuration de l'Expert Intégration Web3
# Version: 2.0.0
# ============================================================================

subagent:
  id: "web3_integration"
  name: "Web3IntegrationSubAgent"
  display_name: "🔗 Expert Intégration Web3"
  version: "2.0.0"
  enabled: true
  description: "Expert en intégration Web3 (wagmi, ethers, viem)"
  class_name: "Web3IntegrationSubAgent"
  module_path: "agents.frontend_web3.sous_agents.web3_integration.agent"

# ============================================================================
# SYSTÈME
# ============================================================================
system:
  log_level: "INFO"
  timeout_seconds: 60
  max_retries: 2

# ============================================================================
# CAPACITÉS
# ============================================================================
capabilities:
  - name: "wallet_connection_advanced"
  - name: "contract_interaction_master"
  - name: "transaction_management"
  - name: "multi_chain_support"
  - name: "abi_management"

# ============================================================================
# TECHNOLOGIES SUPPORTÉES
# ============================================================================
technologies:
  supported:
    - "wagmi"
    - "viem"
    - "ethers.js v6"

# ============================================================================
# OUTPUTS PRODUITS
# ============================================================================
outputs:
  - name: "wallet_connection_system"
  - name: "contract_interaction_hooks"

# ============================================================================
# MÉTADONNÉES
# ============================================================================
metadata:
  author: "SmartContractDevPipeline"
  maintainer: "dev@poolsync.io"
  license: "Proprietary"
  capabilities_count: 5
  last_reviewed: "2026-03-10"
